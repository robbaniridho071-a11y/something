<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mau Jadi Pacarku? ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
            height: 100vh;
        }

        .bg-romantic {
            background: linear-gradient(-45deg, #ff6b9d, #ff8fab, #ffa8c8, #ffb3d1, #ff9ff3);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* 💖 TITLE PINK GLOW */
        .title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 8vw, 6rem);
            color: #ff4fa3;
            text-shadow:
                0 0 10px #ff69b4,
                0 0 20px #ff1493,
                0 0 30px #ff1493;
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            50% { transform: scale(1.05); }
        }

        .heart-icon {
            font-size: 10rem;
            color: #ff1493;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            14%,42% { transform: scale(1.3); }
        }

        .buttons {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 1.5rem 3rem;
            font-size: 1.5rem;
            border-radius: 50px;
            border: none;
            cursor: pointer;
        }

        .btn-yes {
            background: #00cc6a;
            color: white;
        }

        .btn-no {
            background: #ff3838;
            color: white;
            position: relative;
        }

        .popup-yes {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .popup-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
<div class="bg-romantic"></div>

<div class="container">
    <div class="title">Mau Jadi Pacarku?</div>
    <div class="heart-icon">💕</div>
    <div class="buttons">
        <button class="btn btn-yes" onclick="handleYes()">YES 😍</button>
        <button class="btn btn-no" id="noBtn">NO 😢</button>
    </div>
</div>

<div class="popup-yes" id="popup">
    <div class="popup-content">
        <h1>YESS!! 🎉</h1>
        <p>Aku cinta kamu ❤️</p>
    </div>
</div>

<script>
const noBtn = document.getElementById('noBtn');

noBtn.addEventListener('mouseenter', () => {
    const x = Math.random() * 200 - 100;
    const y = Math.random() * 200 - 100;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

noBtn.addEventListener('click', (e) => {
    e.preventDefault();
});

function handleYes() {
    document.getElementById('popup').style.display = 'flex';
}
</script>

</body>
</html>
